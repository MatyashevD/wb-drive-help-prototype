<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f6f6f9" />
    <title>WB Drive — Помощь (прототип)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>
    <!-- Подсказка для десктопа -->
    <aside class="desk-hint" aria-hidden="true">
        <div class="desk-hint__inner">
            <strong>WB Drive · Помощь</strong>
            <span>Прототип. Откройте на смартфоне или сузьте окно браузера до ~430px.</span>
        </div>
    </aside>

    <!-- Мобильный фрейм (видим на десктопе как макет, на мобилке — на весь экран) -->
    <div class="phone" id="phone">
        <div class="phone__screen" id="screen">
            <!-- Контент рендерится JS -->
        </div>
    </div>

    <!-- SVG sprite со всеми иконками -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
        <defs>
            <symbol id="i-chevron-right" viewBox="0 0 24 24">
                <path d="M9 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </symbol>
            <symbol id="i-chevron-left" viewBox="0 0 24 24">
                <path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </symbol>
            <symbol id="i-search" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="6.5" fill="none" stroke="currentColor" stroke-width="1.6"/>
                <path d="M16 16l4.5 4.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </symbol>
            <symbol id="i-close" viewBox="0 0 24 24">
                <path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </symbol>
            <symbol id="i-info" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.6"/>
                <circle cx="12" cy="8" r="1" fill="currentColor"/>
                <path d="M12 11v6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </symbol>
            <symbol id="i-settings" viewBox="0 0 24 24">
                <path d="M12 8.5a3.5 3.5 0 100 7 3.5 3.5 0 000-7z" fill="none" stroke="currentColor" stroke-width="1.6"/>
                <path d="M19.5 12a7.5 7.5 0 00-.1-1.3l1.9-1.4-1.9-3.3-2.2.8a7.5 7.5 0 00-2.3-1.3l-.4-2.4h-3.8l-.4 2.4a7.5 7.5 0 00-2.3 1.3l-2.2-.8L3.7 9.3 5.6 10.7a7.5 7.5 0 00 0 2.6L3.7 14.7l1.9 3.3 2.2-.8a7.5 7.5 0 002.3 1.3l.4 2.4h3.8l.4-2.4a7.5 7.5 0 002.3-1.3l2.2.8 1.9-3.3-1.9-1.4c0-.4.1-.8.1-1.3z" fill="none" stroke="currentColor" stroke-width="1.4"/>
            </symbol>
            <symbol id="i-mail" viewBox="0 0 24 24">
                <rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/>
                <path d="M3.5 6.5l8.5 7 8.5-7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            </symbol>
            <symbol id="i-file" viewBox="0 0 24 24">
                <path d="M7 3h7l4 4v13a1 1 0 01-1 1H7a1 1 0 01-1-1V4a1 1 0 011-1z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                <path d="M14 3v4h4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                <path d="M9 12h6M9 15h6M9 18h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </symbol>
            <symbol id="i-lock" viewBox="0 0 24 24">
                <rect x="5" y="11" width="14" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/>
                <path d="M8 11V8a4 4 0 018 0v3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </symbol>
            <symbol id="i-error" viewBox="0 0 24 24">
                <path d="M12 3l10 18H2L12 3z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                <path d="M12 10v5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                <circle cx="12" cy="18" r="1" fill="currentColor"/>
            </symbol>
            <symbol id="i-user" viewBox="0 0 40 40">
                <circle cx="20" cy="15" r="6" fill="none" stroke="currentColor" stroke-width="1.8"/>
                <path d="M8 33c2-6 7-9 12-9s10 3 12 9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </symbol>
            <symbol id="i-share" viewBox="0 0 24 24">
                <circle cx="6" cy="12" r="2.5" fill="none" stroke="currentColor" stroke-width="1.6"/>
                <circle cx="18" cy="6" r="2.5" fill="none" stroke="currentColor" stroke-width="1.6"/>
                <circle cx="18" cy="18" r="2.5" fill="none" stroke="currentColor" stroke-width="1.6"/>
                <path d="M8 11l8-4M8 13l8 4" stroke="currentColor" stroke-width="1.6"/>
            </symbol>
            <symbol id="i-logout" viewBox="0 0 24 24">
                <path d="M14 4h4a2 2 0 012 2v12a2 2 0 01-2 2h-4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                <path d="M10 8l-4 4 4 4M6 12h10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </symbol>
            <symbol id="i-briefcase" viewBox="0 0 24 24">
                <rect x="3" y="7" width="18" height="13" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/>
                <path d="M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2" fill="none" stroke="currentColor" stroke-width="1.6"/>
            </symbol>
            <symbol id="i-wallet" viewBox="0 0 24 24">
                <rect x="3" y="6" width="18" height="13" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/>
                <path d="M16 12.5a1.5 1.5 0 100 3h5v-3z" fill="none" stroke="currentColor" stroke-width="1.6"/>
            </symbol>
            <symbol id="i-chat" viewBox="0 0 24 24">
                <path d="M4 5h16a1 1 0 011 1v10a1 1 0 01-1 1h-9l-5 4v-4H4a1 1 0 01-1-1V6a1 1 0 011-1z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            </symbol>
            <symbol id="i-profile-tab" viewBox="0 0 24 24">
                <circle cx="12" cy="9" r="3.5" fill="currentColor"/>
                <path d="M5 20c1.5-3.5 4.5-5 7-5s5.5 1.5 7 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/>
            </symbol>

            <!-- Иконки категорий -->
            <symbol id="cat-route" viewBox="0 0 24 24">
                <path d="M6 4a3 3 0 100 6 3 3 0 000-6zm0 0v8M6 12c0 4 12 4 12 8" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                <path d="M18 14a3 3 0 100 6 3 3 0 000-6z" fill="none" stroke="currentColor" stroke-width="1.6"/>
            </symbol>
            <symbol id="cat-payment" viewBox="0 0 24 24">
                <rect x="3" y="6" width="18" height="13" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/>
                <path d="M3 10h18" stroke="currentColor" stroke-width="1.6"/>
                <path d="M7 15h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </symbol>
            <symbol id="cat-document" viewBox="0 0 24 24">
                <path d="M7 3h7l4 4v13a1 1 0 01-1 1H7a1 1 0 01-1-1V4a1 1 0 011-1z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                <path d="M14 3v4h4M9 12h6M9 15h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </symbol>
            <symbol id="cat-return" viewBox="0 0 24 24">
                <path d="M3 12a9 9 0 1 0 3-6.7" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                <path d="M3 4v5h5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </symbol>
            <symbol id="cat-account" viewBox="0 0 24 24">
                <circle cx="12" cy="9" r="4" fill="none" stroke="currentColor" stroke-width="1.6"/>
                <path d="M5 20c1.6-4 4.6-5.5 7-5.5s5.4 1.5 7 5.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none"/>
            </symbol>
            <symbol id="cat-support" viewBox="0 0 24 24">
                <path d="M4 12a8 8 0 0116 0v3a3 3 0 01-3 3h-1v-7h4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M4 15v-3h4v7H7a3 3 0 01-3-3z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            </symbol>

            <!-- Иконка для featured-карточки -->
            <symbol id="i-rocket" viewBox="0 0 24 24">
                <path d="M14 4c4 0 6 2 6 6 0 6-7 11-7 11s-3-1.5-5-3.5S4.5 11 4.5 11s5-7 9.5-7z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                <circle cx="14.5" cy="9.5" r="1.7" fill="none" stroke="currentColor" stroke-width="1.6"/>
                <path d="M8 16c-1.5.5-2.5 2-3 4 2-.5 3.5-1.5 4-3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            </symbol>

            <symbol id="i-fire" viewBox="0 0 24 24">
                <path d="M12 3s5 4 5 9a5 5 0 11-10 0c0-2 1-3 1-3s1 2 3 2c0-3-1-4 1-8z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            </symbol>

            <symbol id="i-headset" viewBox="0 0 24 24">
                <path d="M4 13a8 8 0 0116 0" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                <rect x="3" y="13" width="4" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.6"/>
                <rect x="17" y="13" width="4" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.6"/>
                <path d="M21 19v1a3 3 0 01-3 3h-3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </symbol>
        </defs>
    </svg>

    <script src="data.js?v=2"></script>
    <script src="app.js?v=2"></script>
</body>
</html>
